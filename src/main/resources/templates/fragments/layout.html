<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Head Fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Identity Reconciler</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<!-- Header Fragment -->
<header th:fragment="header">
    <div class="header-container">
        <h1 class="app-title">Identity Reconciler</h1>
        <p class="app-subtitle">Person Record Matching Service</p>
    </div>
</header>

<!-- Navigation Fragment -->
<nav th:fragment="nav">
    <div class="nav-container">
        <a th:href="@{/ui/input}" class="nav-link">Home</a>
        <a th:href="@{/ui/datasets}" class="nav-link">Sample Datasets</a>
        <a th:href="@{/api/v1/reconcile}" class="nav-link" target="_blank">API Docs</a>
    </div>
</nav>

<!-- Footer Fragment -->
<footer th:fragment="footer">
    <div class="footer-container">
        <p>&copy; 2025 Identity Reconciler &mdash; v0.0.1-SNAPSHOT</p>
    </div>
</footer>

</html>
