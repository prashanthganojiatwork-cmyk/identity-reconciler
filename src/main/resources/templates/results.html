<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reconciliation Results')}">
    <title>Reconciliation Results</title>
</head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>
    <nav th:replace="~{fragments/layout :: nav}"></nav>

    <main>
        <div class="card">
            <h2 class="card-title">Reconciliation Results</h2>

            <!-- Metadata Summary Bar -->
            <div class="metadata-bar">
                <div class="metadata-item">
                    <span class="metadata-value" th:text="${response.metadata().sourceACount()}">0</span>
                    <span class="metadata-label">Source A</span>
                </div>
                <div class="metadata-item">
                    <span class="metadata-value" th:text="${response.metadata().sourceBCount()}">0</span>
                    <span class="metadata-label">Source B</span>
                </div>
                <div class="metadata-item">
                    <span class="metadata-value" th:text="${response.metadata().matchesFound()}">0</span>
                    <span class="metadata-label">Matches</span>
                </div>
                <div class="metadata-item">
                    <span class="metadata-value" th:text="${response.metadata().flaggedForReview()}">0</span>
                    <span class="metadata-label">For Review</span>
                </div>
                <div class="metadata-item">
                    <span class="metadata-value" th:text="${response.metadata().processingDurationMs() + ' ms'}">0 ms</span>
                    <span class="metadata-label">Duration</span>
                </div>
            </div>
        </div>

        <!-- Filter Controls -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterResults('all')">All</button>
            <button class="filter-btn" onclick="filterResults('match')">Matches Only</button>
            <button class="filter-btn" onclick="filterResults('review')">Review Only</button>
            <button class="filter-btn" onclick="filterResults('ambiguous')">Ambiguous Only</button>
        </div>

        <!-- Results Table -->
        <div class="card" th:if="${response.matches() != null and !response.matches().isEmpty()}">
            <div class="table-responsive">
                <table class="results-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Source A ID</th>
                        <th>Source B ID</th>
                        <th>Score</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="match, iterStat : ${response.matches()}"
                        th:classappend="${match.status() == 'match'} ? 'match' : (${match.status() == 'review'} ? 'review' : 'ambiguous')"
                        th:attr="data-status=${match.status()}">
                        <td data-label="#" th:text="${iterStat.index + 1}">1</td>
                        <td data-label="Source A" th:text="${match.sourceARecordId()}">A-001</td>
                        <td data-label="Source B" th:text="${match.sourceBRecordId()}">B-001</td>
                        <td data-label="Score">
                            <span class="score-badge"
                                  th:classappend="${match.confidenceScore() >= 0.7} ? 'high' : (${match.confidenceScore() >= 0.4} ? 'medium' : 'low')"
                                  th:text="${#numbers.formatDecimal(match.confidenceScore(), 1, 2)}">0.85</span>
                        </td>
                        <td data-label="Status">
                            <span class="score-badge"
                                  th:classappend="${match.status() == 'match'} ? 'high' : (${match.status() == 'review'} ? 'medium' : 'low')"
                                  th:text="${match.status()}">match</span>
                        </td>
                        <td data-label="Actions">
                            <a style="color: var(--color-accent); text-decoration: none; font-weight: 500;"
                               th:href="@{/ui/results/{jid}/match/{idx}(jid=${jobId}, idx=${iterStat.index})}">
                                View Details &rarr;
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div class="card" th:if="${response.matches() == null or response.matches().isEmpty()}"
             style="text-align: center; padding: 3rem; color: var(--color-text-light);">
            <p>No match candidates found above the review band threshold.</p>
        </div>

        <div style="margin-top: 1.5rem;">
            <a th:href="@{/ui/input}" class="btn btn-secondary">&larr; New Reconciliation</a>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script>
    function filterResults(status) {
        document.querySelectorAll('.filter-btn').forEach(function(btn) { btn.classList.remove('active'); });
        event.target.classList.add('active');
        document.querySelectorAll('table tbody tr').forEach(function(row) {
            row.style.display = (status === 'all' || row.getAttribute('data-status') === status) ? '' : 'none';
        });
    }
    </script>
</body>
</html>
