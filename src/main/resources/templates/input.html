<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Identity Reconciler - Input')}">
    <title>Identity Reconciler - Input</title>
</head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>
    <nav th:replace="~{fragments/layout :: nav}"></nav>

    <main>
        <div class="card">
            <h2 class="card-title">Reconcile Person Records</h2>
            <p style="color: var(--color-text-light); margin-bottom: 1rem; font-size: 0.875rem;">
                Paste JSON arrays of person records from two sources to identify matches between them.
                Or try our <a th:href="@{/ui/datasets}" style="color: var(--color-accent);">sample datasets</a> to see the engine in action.
            </p>

            <!-- Error message display -->
            <div th:if="${error}" class="error-message" th:text="${error}"></div>

            <form method="POST" th:action="@{/ui/reconcile}">
                <!-- Source A Textarea -->
                <div class="form-group">
                    <label for="sourceAJson">Source A Records (JSON)</label>
                    <textarea id="sourceAJson" name="sourceAJson" rows="10"
                              th:text="${sourceAJson}"
                              placeholder='[{"id":"1","firstname":"John","lastname":"Smith","phone":"2065551234","email":"john@example.com","dateOfBirth":"1990-05-15","address":{"streetLine1":"100 Main St","city":"Seattle","stateCode":"WA","postalCode":"98101"}}]'></textarea>
                </div>

                <!-- Source B Textarea -->
                <div class="form-group">
                    <label for="sourceBJson">Source B Records (JSON)</label>
                    <textarea id="sourceBJson" name="sourceBJson" rows="10"
                              th:text="${sourceBJson}"
                              placeholder='[{"id":"A1","firstname":"Jon","lastname":"Smith","phone":"(206) 555-1234","email":"john+work@example.com","dateOfBirth":"05/15/1990","address":{"streetLine1":"100 Main Street","city":"Seattle","stateCode":"WA","postalCode":"98101"}}]'></textarea>
                </div>

                <!-- Threshold Configuration -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="matchThreshold">Match Threshold
                            <span class="tooltip-icon" title="Scores at or above this value are considered positive matches. Lower it to catch more matches (more false positives), raise it to be stricter (fewer false positives).">&#9432;</span>
                        </label>
                        <input type="number" id="matchThreshold" name="matchThreshold"
                               th:value="${matchThreshold != null ? matchThreshold : 0.7}"
                               min="0" max="1" step="0.01" />
                    </div>
                    <div class="form-group">
                        <label for="reviewBandLowerBound">Review Band Lower Bound
                            <span class="tooltip-icon" title="Scores between this value and the Match Threshold are flagged for human review. Scores below this are excluded entirely from results.">&#9432;</span>
                        </label>
                        <input type="number" id="reviewBandLowerBound" name="reviewBandLowerBound"
                               th:value="${reviewBandLowerBound != null ? reviewBandLowerBound : 0.4}"
                               min="0" max="1" step="0.01" />
                    </div>
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit" class="btn btn-primary">Reconcile</button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script>
    // Load sample data from datasets page if available
    document.addEventListener('DOMContentLoaded', function() {
        const sourceA = sessionStorage.getItem('sampleSourceA');
        const sourceB = sessionStorage.getItem('sampleSourceB');
        if (sourceA && sourceB) {
            document.getElementById('sourceAJson').value = sourceA;
            document.getElementById('sourceBJson').value = sourceB;
            sessionStorage.removeItem('sampleSourceA');
            sessionStorage.removeItem('sampleSourceB');
        }
    });
    </script>
</body>
</html>
